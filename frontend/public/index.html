<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="description" content="YOLOv11 Image Search - AI-Powered Object Detection & Visual Search Engine. Upload images, detect objects using deep learning, and search your image library by content. Built with React, Node.js, and Python by Satyam Kumar." />
    
    <!-- SEO Meta Tags -->
    <meta name="keywords" content="YOLO, YOLOv11, object detection, image search, computer vision, AI, machine learning, deep learning, React, Python, Satyam Kumar, B.Tech project" />
    <meta name="author" content="Satyam Kumar" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="YOLOv11 Image Search | AI-Powered Object Detection" />
    <meta property="og:description" content="Intelligent image search using YOLOv11 object detection. Upload, analyze, and search images by detected objects." />
    <meta property="og:site_name" content="YOLOv11 Image Search" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="YOLOv11 Image Search | AI Object Detection" />
    <meta name="twitter:description" content="AI-powered visual search engine using YOLOv11 for real-time object detection." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA Support -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="YOLO Search" />
    
    <title>YOLOv11 Image Search | AI Object Detection - Satyam Kumar</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0e1a;
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Loading Screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      .loader-logo {
        font-size: 2.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, #10b981, #6366f1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 2rem;
        letter-spacing: -1px;
      }
      .loader-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(99, 102, 241, 0.2);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .loader-text {
        margin-top: 1.5rem;
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.9rem;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loader-logo">YOLOv11 Search</div>
      <div class="loader-spinner"></div>
      <p class="loader-text">Loading AI Models...</p>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Hide loading screen when React app loads
      window.addEventListener('load', function() {
        setTimeout(function() {
          document.getElementById('loading-screen').classList.add('hidden');
        }, 800);
      });
    </script>
</body>
</html>
